[env:esp32devkitv1]
platform = espressif32
board = esp32dev ; 🎯 切换为经典的单核/双核标准 ESP32
framework = arduino

build_src_filter = +<main.cpp> -<main-beta.cpp>

; 标准板型通常是 4MB Flash
board_upload.flash_size = 4MB
board_build.flash_mode = dio

lib_deps =
    ;6674                     ; 你的超声波/传感器库
    ;adafruit/Adafruit BusIO
    ;Wire

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; 🎯 砍掉了所有 S3 特有的 USB 宏定义，回归最纯粹的硬件串口
build_flags = 
    -D CORE_DEBUG_LEVEL=3